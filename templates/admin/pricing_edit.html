{% extends "admin/base.html" %}
{% block admin_title %}Upravit položku ceníku{% endblock %}

{% block admin_content %}
<div class="admin-header">
    <h1>Upravit položku ceníku</h1>
    <a href="{{ url_for('admin_pricing') }}" class="btn btn-secondary btn-sm">Zpět na ceník</a>
</div>

<div class="admin-card">
    <form method="POST">
        <div class="form-grid-2">
            <div class="form-group">
                <label for="category">Kategorie</label>
                <input type="text" id="category" name="category" class="form-control" value="{{ item.category }}" required>
            </div>
            <div class="form-group">
                <label for="category_note">Poznámka kategorie</label>
                <input type="text" id="category_note" name="category_note" class="form-control" value="{{ item.category_note or '' }}">
            </div>
            <div class="form-group">
                <label for="label">Název položky</label>
                <input type="text" id="label" name="label" class="form-control" value="{{ item.label }}" required>
            </div>
            <div class="form-group">
                <label for="price">Cena</label>
                <input type="text" id="price" name="price" class="form-control" value="{{ item.price }}" required>
            </div>
            <div class="form-group">
                <label for="sort_order">Pořadí</label>
                <input type="number" id="sort_order" name="sort_order" class="form-control" value="{{ item.sort_order }}">
            </div>
        </div>
        <label class="form-check">
            <input type="checkbox" name="featured" {% if item.featured %}checked{% endif %}>
            <span>Zvýraznit kategorii</span>
        </label>
        <label class="form-check" style="margin: .5rem 0 1rem;">
            <input type="checkbox" name="published" {% if item.published %}checked{% endif %}>
            <span>Zobrazit na webu</span>
        </label>
        <button type="submit" class="btn btn-primary">Uložit položku</button>
    </form>
</div>
{% endblock %}
